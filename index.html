<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Learning Machine — Interactive Machine Learning</title>
  <meta name="description" content="Interactive browser-based Machine Learning course featuring Python sandboxes, visual explainers, and interactive assessments." />
  <link rel="stylesheet" href="index.css" />
</head>
<body>

  <!-- Top Navigation Bar -->
  <header class="top-navbar">
    <a href="#" class="brand" onclick="store.setActiveLesson(101)">
      <div class="brand-icon">🤖</div>
      <span>Learning Machine</span>
    </a>

    <div class="nav-actions">
      <div class="progress-pill">
        <span style="color: var(--text-secondary); font-size: 0.82rem;">Course Progress</span>
        <div class="progress-bar-container">
          <div class="progress-bar-fill" id="overallProgressFill"></div>
        </div>
        <span id="overallProgressText" style="font-family: var(--font-mono);">0%</span>
      </div>

      <button class="cert-badge locked" id="certNavBadge" title="Complete all lessons and module quizzes to unlock your certificate">
        🔒 Certificate Locked
      </button>
    </div>
  </header>

  <!-- Layout Shell -->
  <div class="app-shell">
    
    <!-- Sidebar Navigation -->
    <aside class="sidebar">
      <div class="sidebar-heading">Curriculum</div>

      <div id="sidebarModulesContainer">
        <!-- Rendered dynamically by app.js -->
      </div>
    </aside>

    <!-- Main Workspace Container -->
    <main class="main-workspace">
      
      <!-- Content Tabs -->
      <div style="display: flex; gap: 0.75rem; margin-bottom: 1.5rem; align-items: center; border-bottom: 1px solid var(--border-glass); padding-bottom: 0.85rem;" id="systemTabsContainer">
        <button class="btn btn-primary" id="tabLessonBtn">
          🎬 Video Lesson
        </button>
        <button class="btn btn-secondary" id="tabExplainerBtn">
          📊 Visual Explainer
        </button>
        <button class="btn btn-secondary" id="tabSandboxBtn">
          🐍 Code Sandbox
        </button>
        <button class="btn btn-secondary" id="tabQuizBtn">
          📝 Assessment
        </button>
      </div>

      <!-- View Containers -->
      <div id="videoSystemContainer"></div>
      <div id="visualExplainerContainer" style="display: none;"></div>
      <div id="sandboxSystemContainer" style="display: none;"></div>
      <div id="quizSystemContainer" style="display: none;"></div>

    </main>
  </div>

  <!-- JavaScript Modules -->
  <script src="js/course-data.js"></script>
  <script src="js/state-store.js"></script>
  <script src="js/video-system.js"></script>
  <script src="js/visual-explainer.js"></script>
  <script src="js/sandbox-system.js"></script>
  <script src="js/quiz-system.js"></script>
  <script src="js/certificate-system.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
